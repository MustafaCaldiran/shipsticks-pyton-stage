[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Custom markers for selective test execution
markers =
    smoke: Quick sanity checks
    booking: Booking flow tests
    e2e: Full end-to-end journeys
    api: API-only tests
    network: Interception and network-observability tests

# Default options: keep collection runnable even before optional plugins are installed
addopts = -v
